name: "Terraform Cloud Automation"

on:
  push:
    branches:
      - master
    paths:
      - 'terraform-aws-eks/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform-aws-eks
    env:
      TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - run: terraform init

      - name: Terraform Plan - Cluster First
        run: terraform plan -target=aws_eks_cluster.training_cluster -target=aws_eks_node_group.training_nodes
        
      - name: Terraform Plan - Everything Else
        run: terraform plan
        
  apply:
    name: "Terraform Apply"
    needs: plan
    runs-on: ubuntu-latest
    environment: terraform-apply
    defaults:
      run:
        working-directory: terraform-aws-eks
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - run: terraform init

      - name: Terraform Apply - Cluster First
        run: terraform apply -auto-approve -target=aws_eks_cluster.training_cluster -target=aws_eks_node_group.training_nodes
        
      - name: Terraform Apply - Everything Else
        run: terraform apply -auto-approve
        